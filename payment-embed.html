<style>
.dap{
  --d-navy:#1a2f5e;--d-nd:#0f1e3d;--d-nl:#243d75;
  --d-gold:#c9a84c;--d-gl:#e8c96a;
  --d-w:#fff;--d-off:#f5f7fa;--d-brd:#e8edf5;
  --d-gr:#8892a4;--d-gd:#4a5568;--d-tx:#1a202c;
  --d-err:#e53e3e;--d-ok:#38a169;
  --d-sh2:0 8px 32px rgba(26,47,94,.2);
  --d-r:12px;--d-rs:8px;--d-tr:all .22s ease;
  font-family:'Segoe UI',system-ui,sans-serif;
  color:var(--d-tx);line-height:1.6;box-sizing:border-box;
}
.dap *,.dap *::before,.dap *::after{box-sizing:border-box;margin:0;padding:0}
.dap button{font-family:inherit;cursor:pointer}

.dap-card{background:var(--d-w);border-radius:20px;padding:40px;box-shadow:var(--d-sh2);max-width:640px;margin:0 auto}

/* ── LOADING ── */
.dap-loading{text-align:center;padding:60px 20px;color:var(--d-gr)}
.dap-loading svg{animation:dap-spin .8s linear infinite;margin-bottom:12px}
.dap-err{background:#fff5f5;border:1.5px solid #fc8181;border-radius:var(--d-r);padding:20px;text-align:center;color:#c53030;font-weight:600;display:none}
.dap-err.vis{display:block}

/* ── SUMAR REZERVARE ── */
.dap-summary{background:linear-gradient(135deg,var(--d-navy),var(--d-nl));border-radius:var(--d-r);padding:20px 24px;color:#fff;margin-bottom:24px}
.dap-sum-title{font-size:.62rem;text-transform:uppercase;letter-spacing:2px;opacity:.6;margin-bottom:12px}
.dap-sum-row{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.08);font-size:.84rem}
.dap-sum-row:last-of-type{border:none}
.dap-sum-lbl{opacity:.75}
.dap-sum-val{font-weight:600}
.dap-sum-total{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:12px;border-top:2px solid rgba(255,255,255,.2)}
.dap-sum-total-l{font-size:.9rem;font-weight:700}
.dap-sum-total-v{font-size:1.5rem;font-weight:800;color:var(--d-gold)}

/* ── STEP HEADER ── */
.dap-sh{display:flex;align-items:center;gap:8px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--d-navy);margin-bottom:14px;padding-bottom:8px;border-top:2px solid var(--d-brd);padding-top:20px}
.dap-sn{width:22px;height:22px;background:var(--d-navy);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:700;flex-shrink:0}

/* ── RADIO PLATĂ ── */
.dap-pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dap-pay-opt input[type=radio]{display:none}
.dap-pay-lbl{display:flex;flex-direction:column;gap:4px;padding:14px;border:2px solid var(--d-brd);border-radius:var(--d-rs);cursor:pointer;transition:var(--d-tr)}
.dap-pay-opt input:checked+.dap-pay-lbl{border-color:var(--d-navy);background:rgba(26,47,94,.05)}
.dap-pay-lbl:hover{border-color:var(--d-nl)}
.dap-pay-name{font-size:.84rem;font-weight:700;color:var(--d-navy);display:flex;align-items:center;gap:6px}
.dap-pay-info{font-size:.7rem;color:var(--d-gr)}

/* ── STRIPE ELEMENT ── */
#dap-pe-wrap{border:1.5px solid var(--d-brd);border-radius:var(--d-rs);padding:16px;background:var(--d-off);margin-bottom:14px}
#dap-payment-element{min-height:44px}
.dap-pe-loading{text-align:center;padding:14px;color:var(--d-gr);font-size:.83rem}
.dap-pe-loading svg{animation:dap-spin .8s linear infinite;vertical-align:middle;margin-right:6px}

/* ── BUTOANE ── */
.dap-acts{display:grid;gap:10px;margin-bottom:10px}
.dap-btn{display:flex;align-items:center;justify-content:center;gap:7px;padding:14px 18px;border:none;border-radius:var(--d-rs);font-size:.9rem;font-weight:700;transition:var(--d-tr);width:100%;cursor:pointer}
.dap-btn:disabled{opacity:.6;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.dap-btn-pdf{background:var(--d-off);border:1.5px solid var(--d-brd);color:var(--d-navy)}
.dap-btn-pdf:hover{background:var(--d-brd)}
.dap-btn-online{background:linear-gradient(135deg,#635bff,#4f46e5);color:#fff;font-size:1rem;padding:16px}
.dap-btn-online:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(99,91,255,.4)}
.dap-btn-boarding{background:linear-gradient(135deg,var(--d-navy),var(--d-nl));color:#fff;font-size:1rem;padding:16px}
.dap-btn-boarding:hover{transform:translateY(-2px);box-shadow:var(--d-sh2)}

/* ── SUCCESS ── */
.dap-success{background:linear-gradient(135deg,#f0fff4,#c6f6d5);border:1.5px solid #38a169;border-radius:var(--d-r);padding:24px;text-align:center;margin-top:16px}
.dap-success-ico{font-size:2.5rem;margin-bottom:10px}
.dap-success-t{font-weight:700;color:#276749;font-size:1.1rem;margin-bottom:6px}
.dap-success-s{font-size:.85rem;color:#2f855a;line-height:1.6}

/* ── TOAST ── */
.dap-toast{position:fixed;bottom:24px;right:24px;background:var(--d-navy);color:#fff;padding:12px 18px;border-radius:10px;font-size:.83rem;box-shadow:0 8px 24px rgba(0,0,0,.2);z-index:99999;transform:translateY(100px);opacity:0;transition:all .3s ease;max-width:300px;pointer-events:none}
.dap-toast.show{transform:translateY(0);opacity:1}

/* ── SPINNER ── */
@keyframes dap-spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .dap-card{padding:22px 16px}
  .dap-pay-grid{grid-template-columns:1fr}
}
</style>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIGURARE — completează înainte de publicare
   ═══════════════════════════════════════════════════════════════ */
const DAP_CONFIG = {
  serverUrl:          'https://delta-air-server-production.up.railway.app',
  stripePublishableKey: 'pk_test_51T96P5CbTt6s0regCRlyFzCLYa5WW0GiUBEexUPS25Xqgb8LJ8Nt0QV0uou4ifqIumpKr2UMYQl7QPcWOtgwYZy700RYCISjtj',
  // URL pagina de rezervari (pentru redirect 3DS)
  bookingPageUrl: 'https://delta-air.ro/rezervare',
};

/* ── Helpers ── */
const dg  = id => document.getElementById(id);
const dgr = name => document.querySelector(`input[name=${name}]:checked`)?.value || '';

/* ── Date rezervare (populate din server) ── */
let _bk   = null;   // bookingData
let _stripe = null, _stripeElements = null;

/* ══════════════════════════════════════════════════════════════
   INIȚIALIZARE — citește sesiunea din URL și afișează datele
   ══════════════════════════════════════════════════════════════ */
(async function dapInit() {
  const params    = new URLSearchParams(window.location.search);
  const sessionId = params.get('session');

  if (!sessionId) { showErr(); return; }

  try {
    const res = await fetch(`${DAP_CONFIG.serverUrl}/api/get-session/${sessionId}`);
    if (!res.ok) throw new Error('not found');
    const { bookingData } = await res.json();
    _bk = bookingData;
    renderSummary();
    dg('dap-loading').style.display = 'none';
    dg('dap-content').style.display = 'block';
  } catch (_) {
    showErr();
  }
})();

function showErr() {
  dg('dap-loading').style.display = 'none';
  dg('dap-err').classList.add('vis');
}

/* ══════════════════════════════════════════════════════════════
   RENDER SUMAR
   ══════════════════════════════════════════════════════════════ */
function renderSummary() {
  const b = _bk;
  const rows = [];

  rows.push(['Direcție',      b.dirLabel]);
  rows.push(['Cursă · Data',  `${b.tripLabel} · ${b.date}`]);
  rows.push(['Tip transfer',  b.trLabel]);
  if (b.depTime) rows.push(['Plecare',  b.depTime + (b.pickupLabel ? ` din ${b.pickupLabel}` : '')]);
  if (b.arrTime) rows.push(['Sosire',   b.arrTime]);
  rows.push(['Pasageri',      `${b.adults} adult(ți)${b.children > 0 ? ` · ${b.children} copil` : ''}${b.bags > 0 ? ` · ${b.bags} bagaj extra` : ''}`]);
  if (b.buyer === 'pf') {
    rows.push(['Client',  b.name]);
    rows.push(['Contact', `${b.phone} · ${b.email}`]);
  } else {
    rows.push(['Societate', b.firm]);
    rows.push(['CUI',       b.cui]);
    rows.push(['Contact',   `${b.contactName} · ${b.contactPhone}`]);
  }

  dg('dap-sum-rows').innerHTML = rows.map(([l, v]) =>
    `<div class="dap-sum-row"><span class="dap-sum-lbl">${l}</span><span class="dap-sum-val">${v}</span></div>`
  ).join('');

  dg('dap-total').textContent = `${b.total} lei`;
}

/* ══════════════════════════════════════════════════════════════
   ALEGERE MODALITATE PLATĂ
   ══════════════════════════════════════════════════════════════ */
function dapPayChange() {
  const pay    = dgr('dap_pay');
  const btn    = dg('dap-finalize-btn');
  const peWrap = dg('dap-pe-wrap');

  dg('dap-success').style.display = 'none';

  if (pay === 'online') {
    peWrap.style.display = 'block';
    btn.className = 'dap-btn dap-btn-online';
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg> Plătește online`;
    if (!_stripeElements) dapInitStripe();
  } else {
    peWrap.style.display = 'none';
    btn.className = 'dap-btn dap-btn-boarding';
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="10"/></svg> Confirmă rezervarea`;
  }
}

/* ══════════════════════════════════════════════════════════════
   STRIPE PAYMENT ELEMENT
   ══════════════════════════════════════════════════════════════ */
async function dapInitStripe() {
  if (!window.Stripe) {
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://js.stripe.com/v3/';
      s.onload = res; s.onerror = rej;
      document.head.appendChild(s);
    });
  }
  _stripe = Stripe(DAP_CONFIG.stripePublishableKey);

  _stripeElements = _stripe.elements({
    mode: 'payment',
    amount: Math.round((_bk.total || 0) * 100),
    currency: 'ron',
    payment_method_types: ['card'],
    appearance: {
      theme: 'stripe',
      variables: { colorPrimary:'#1a2f5e', borderRadius:'8px', fontFamily:"'Segoe UI',system-ui,sans-serif" },
    },
  });

  const pe = _stripeElements.create('payment', {
    fields:  { billingDetails: { address: { postalCode: 'never' } } },
    wallets: { link:'never', applePay:'never', googlePay:'never' },
  });

  dg('dap-pe-loading').style.display = 'none';
  pe.mount('#dap-payment-element');
}

/* ══════════════════════════════════════════════════════════════
   FINALIZARE
   ══════════════════════════════════════════════════════════════ */
async function dapFinalize() {
  const pay = dgr('dap_pay');
  const btn = dg('dap-finalize-btn');

  /* ── La îmbarcare ── */
  if (pay === 'boarding') {
    btn.disabled = true;
    dg('dap-success').style.display = 'block';
    dg('dap-success').scrollIntoView({ behavior:'smooth', block:'nearest' });
    return;
  }

  /* ── Online ── */
  if (!_stripeElements) { dapToast('Formularul de plată nu e gata. Încearcă din nou.'); return; }

  btn.disabled = true;
  btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="animation:dap-spin .8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Se procesează...`;

  /* 1. Validează câmpurile card */
  const { error: submitErr } = await _stripeElements.submit();
  if (submitErr) {
    dapToast(submitErr.message);
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg> Plătește online`;
    return;
  }

  /* 2. Creează PaymentIntent pe server */
  const meta = { buyer: _bk.buyer, ..._bk };
  let clientSecret;
  try {
    const res = await fetch(`${DAP_CONFIG.serverUrl}/api/create-payment-intent`, {
      method:  'POST',
      headers: { 'Content-Type':'application/json' },
      body:    JSON.stringify({ amount: Math.round(_bk.total * 100), currency:'ron', meta }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    ({ clientSecret } = await res.json());
  } catch (err) {
    dapToast(`Eroare server: ${err.message}.`);
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg> Plătește online`;
    return;
  }

  /* 3. Confirmă plata */
  const custEmail = _bk.buyer === 'pf' ? _bk.email : _bk.contactEmail;
  const custName  = _bk.buyer === 'pf' ? _bk.name  : _bk.contactName;
  const { error } = await _stripe.confirmPayment({
    elements:      _stripeElements,
    clientSecret,
    confirmParams: {
      return_url: `${DAP_CONFIG.bookingPageUrl}?session=${new URLSearchParams(window.location.search).get('session')}`,
      payment_method_data: { billing_details: { name: custName, email: custEmail } },
    },
    redirect: 'if_required',
  });

  if (error) {
    dapToast(`Eroare plată: ${error.message}`);
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg> Plătește online`;
    return;
  }

  /* 4. Succes */
  await dapGeneratePDF();
  dg('dap-success-t').textContent = 'Plată procesată cu succes!';
  dg('dap-success-s').innerHTML   = `Vei primi confirmarea pe email la <strong>${custEmail}</strong>.<br>Contractul PDF a fost descărcat automat.`;
  dg('dap-success').style.display = 'block';
  dg('dap-success').scrollIntoView({ behavior:'smooth', block:'nearest' });
}

/* ══════════════════════════════════════════════════════════════
   PDF CONTRACT
   ══════════════════════════════════════════════════════════════ */
function dapDownloadPDF() { dapGeneratePDF(); }

function dapLoadScript(src) {
  return new Promise((res, rej) => {
    if (document.querySelector(`script[src="${src}"]`)) { res(); return; }
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

function dapNumToWords(n) {
  const u=['','unu','doi','trei','patru','cinci','sase','sapte','opt','noua','zece',
           'unsprezece','doisprezece','treisprezece','paisprezece','cincisprezece',
           'saisprezece','saptesprezece','optsprezece','nouasprezece'];
  const d=['','','douazeci','treizeci','patruzeci','cincizeci','saizeci','saptezeci','optzeci','nouazeci'];
  if(n===0)return'zero';if(n<20)return u[n];
  if(n<100)return d[Math.floor(n/10)]+(n%10?' si '+u[n%10]:'');
  if(n<1000){const h=Math.floor(n/100),r=n%100;return(h===1?'una suta':u[h]+' sute')+(r?' '+dapNumToWords(r):'');}
  if(n<10000){const th=Math.floor(n/1000),r=n%1000;return(th===1?'una mie':dapNumToWords(th)+' mii')+(r?' '+dapNumToWords(r):'');}
  return n.toString();
}

async function dapGeneratePDF() {
  try { await dapLoadScript('https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js'); }
  catch(e){ dapToast('Nu s-a putut genera PDF-ul.'); return; }

  const b = _bk;
  const today = new Date();
  const dateStr = today.toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric'});
  const payL = dgr('dap_pay') === 'online' ? 'Card online (Stripe)' : 'Numerar / Card la îmbarcare';
  const totalNum = b.total || 0;

  let benefName, benefRep, benefContact, benefAddr='';
  if (b.buyer==='pf') {
    benefName=b.name; benefRep=b.name;
    benefContact=`Tel: ${b.phone} | E-mail: ${b.email}`;
  } else {
    benefName=b.firm; benefRep=b.contactName; benefAddr=b.sediu||'';

/* ══════════════════════════════════════════════════════════════

   ══════════════════════════════════════════════════════════════ */
function dapToast(msg) {
  const el = dg('dap-toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3500);
}

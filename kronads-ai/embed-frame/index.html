<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KronAds — Solicită automatizare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f1e3d 0%, #1a2f5e 100%);
      padding: 36px 28px 32px;
      color: #fff;
      min-height: 100%;
    }

    .badge {
      display: inline-block;
      background: rgba(201,168,76,.15);
      border: 1px solid rgba(201,168,76,.3);
      color: #c9a84c;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 4px 14px;
      border-radius: 20px;
      margin-bottom: 16px;
    }
    h2 {
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: 900;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    h2 span { color: #c9a84c; }
    .sub {
      font-size: .9rem;
      color: rgba(255,255,255,.6);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .form { display: flex; flex-direction: column; gap: 14px; }
    .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label {
      display: block;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(255,255,255,.45);
      margin-bottom: 5px;
    }
    input, textarea {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: .9rem;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: border-color .2s;
    }
    input:focus, textarea:focus { border-color: #c9a84c; }
    input::placeholder, textarea::placeholder { color: rgba(255,255,255,.28); }
    textarea { resize: vertical; min-height: 95px; }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: #c9a84c;
      color: #0f1e3d;
      border: none;
      border-radius: 12px;
      font-size: .98rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: 2px;
    }
    .btn-submit:hover { background: #b8943e; transform: translateY(-1px); }
    .btn-submit:disabled { opacity: .6; transform: none; cursor: not-allowed; }

    .msg { text-align: center; font-size: .88rem; font-weight: 600; min-height: 20px; margin-top: 4px; }
    .msg.ok  { color: #4ade80; }
    .msg.err { color: #f87171; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 20px 0 16px;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,.12); }
    .divider span { font-size: .73rem; color: rgba(255,255,255,.35); white-space: nowrap; }

    .btn-wa {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 13px;
      background: #25d366; color: #fff;
      border: none; border-radius: 12px;
      font-size: .92rem; font-weight: 700; font-family: inherit;
      text-decoration: none;
      cursor: pointer;
      transition: background .2s, transform .15s;
      box-shadow: 0 4px 18px rgba(37,211,102,.25);
    }
    .btn-wa:hover { background: #1db954; transform: translateY(-1px); }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: .68rem;
      color: rgba(255,255,255,.2);
    }
    .footer a { color: rgba(201,168,76,.5); text-decoration: none; }

    @media (max-width: 480px) {
      body { padding: 24px 16px 20px; }
      .cols { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="badge">KronAds MKT LLC · AI Automations</div>
  <h2>Automatizează <span>ce faci manual</span></h2>
  <p class="sub">Spune-ne despre fluxurile tale de lucru și îți arătăm în 30 de minute ce poate fi automatizat.</p>

  <form class="form" id="kf" onsubmit="kfSubmit(event)">
    <div class="cols">
      <div>
        <label for="kf-name">Nume *</label>
        <input id="kf-name" type="text" placeholder="Ion Popescu" required>
      </div>
      <div>
        <label for="kf-company">Companie / Domeniu</label>
        <input id="kf-company" type="text" placeholder="E-commerce, Clinică...">
      </div>
    </div>
    <div class="cols">
      <div>
        <label for="kf-email">Email *</label>
        <input id="kf-email" type="email" placeholder="email@firma.ro" required>
      </div>
      <div>
        <label for="kf-phone">Telefon</label>
        <input id="kf-phone" type="tel" placeholder="+40 7xx xxx xxx">
      </div>
    </div>
    <div>
      <label for="kf-desc">Ce vrei să automatizezi? *</label>
      <textarea id="kf-desc" placeholder="Ex: trimit manual facturi după fiecare comandă, procesez rezervări din mai multe surse..." required></textarea>
    </div>
    <button class="btn-submit" type="submit" id="kf-btn">Trimite cererea →</button>
    <div class="msg" id="kf-msg"></div>
  </form>

  <div class="divider"><span>sau contactează-ne direct</span></div>

  <a class="btn-wa" href="https://wa.me/40723644418?text=Buna%20ziua%2C%20as%20vrea%20sa%20discut%20despre%20automatizarea%20afacerii%20mele%20cu%20KronAds." target="_blank" rel="noopener">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
    WhatsApp — răspundem imediat
  </a>

  <div class="footer">Powered by <a href="https://delta-air.ro/kronads-ai/" target="_blank">KronAds MKT LLC</a></div>

  <script>
    async function kfSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('kf-btn');
      const msg = document.getElementById('kf-msg');
      btn.disabled = true;
      btn.textContent = 'Se trimite...';
      msg.className = 'msg';
      msg.textContent = '';
      try {
        const res = await fetch('https://delta-air-server-production.up.railway.app/api/kronads-contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name:        document.getElementById('kf-name').value.trim(),
            company:     document.getElementById('kf-company').value.trim(),
            email:       document.getElementById('kf-email').value.trim(),
            phone:       document.getElementById('kf-phone').value.trim(),
            description: document.getElementById('kf-desc').value.trim(),
          })
        });
        if (res.ok) {
          msg.className = 'msg ok';
          msg.textContent = '✅ Mesaj trimis! Te contactăm în maxim 24 de ore.';
          document.getElementById('kf').reset();
        } else { throw new Error(); }
      } catch {
        msg.className = 'msg err';
        msg.textContent = '⚠️ Eroare. Încearcă pe WhatsApp sau email direct.';
      }
      btn.disabled = false;
      btn.textContent = 'Trimite cererea →';
    }
  </script>
</body>
</html>
